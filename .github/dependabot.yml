version: 2
updates:
  # .NET SDK version pinned in global.json.
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"

  # NuGet package references across the solution's projects.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"

  # Action versions used by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

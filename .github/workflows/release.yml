name: Release

# Builds a user-ready SyncMaid package and publishes it to GitHub Releases whenever a
# version tag (v*) appears. This covers both ways of creating one:
#   - pushing a tag:            git tag v1.2.3 && git push origin v1.2.3   (push event)
#   - creating a release/tag on the GitHub website                        (release event)
# The publish step is idempotent, so if both events fire for the same tag the assets are
# just uploaded to the existing release rather than duplicated.
on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: write      # create the release and upload assets
  id-token: write      # mint the OIDC token for build-provenance attestation
  attestations: write  # write the attestation

# Serialize runs for the same tag so the push and release events can't race.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest  # AOT publish needs the MSVC toolchain, preinstalled here
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer derives the version from the full tag history

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish native AOT (win-x64)
        run: dotnet publish SyncMaid/SyncMaid.csproj -c Release -r win-x64 -o publish

      - name: Package
        id: package
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $zip = "SyncMaid-$version-win-x64.zip"

          # Ship the runnable app only, not debug symbols.
          Remove-Item publish/*.pdb -ErrorAction SilentlyContinue
          Compress-Archive -Path publish/* -DestinationPath $zip -Force

          # Integrity checksum users can verify: Get-FileHash <zip> -Algorithm SHA256
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File "$zip.sha256" -Encoding ascii

          "zip=$zip" >> $env:GITHUB_OUTPUT

      # --- Optional: real Authenticode signing (free only for approved OSS projects) ---
      # SignPath Foundation gives qualifying open-source projects a trusted signing
      # certificate at no cost. Once your project is approved and you've added the
      # SIGNPATH_API_TOKEN secret, uncomment this to sign publish/SyncMaid.exe *before*
      # the Package step above (move this step up, or re-zip after signing).
      # See https://about.signpath.io/product/open-source
      #
      # - name: Sign (SignPath)
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: <your-signpath-org-id>
      #     project-slug: SyncMaid
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: exe
      #     github-artifact-id: ${{ ... }}
      #     wait-for-completion: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.zip }}

      - name: Publish to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $zip = '${{ steps.package.outputs.zip }}'
          $assets = @($zip, "$zip.sha256")

          # Create the release on first run for this tag; otherwise attach to the existing
          # one (the release event may have already created it).
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title $tag --generate-notes
          }
